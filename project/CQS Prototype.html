<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>CQS — Checklist Qualité Soudure</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      min-height: 100%;
      background: #f4f3ef;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    #root { min-height: 100vh; }

    /* CSS vars — init avant React */
    :root { --accent: #1e3a5f; --cordon-h: 52px; }

    /* Input focus ring */
    input:focus, textarea:focus {
      outline: none;
      border-color: var(--accent, #1e3a5f) !important;
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent, #1e3a5f) 15%, transparent);
    }

    /* Cordon button height from tweak */
    .cordon-btn { min-height: var(--cordon-h, 52px); }

    /* Tap highlight suppression on mobile */
    button { -webkit-tap-highlight-color: transparent; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 99px; }
    ::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body>
<div id="root"></div>

<script src="cqs-data.js"></script>
<script type="text/babel" src="cqs-icons.jsx"></script>
<script type="text/babel" src="cqs-ui.jsx"></script>
<script type="text/babel" src="cqs-op-form.jsx"></script>
<script type="text/babel" src="cqs-manager.jsx"></script>
<script type="text/babel" src="cqs-screens.jsx"></script>
</body>
</html>
